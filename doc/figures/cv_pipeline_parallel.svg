<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620">
  <defs>
    <style>
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #2d2a32; }
      .label { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #2d2a32; }
      .small { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #2d2a32; }
      .tiny { font: 500 11px 'Segoe UI', Arial, sans-serif; fill: #2d2a32; }
      .box { stroke-width: 2; rx: 12; ry: 12; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#5f6570"/>
    </marker>
    <marker id="arrowDashed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#845ec2"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1560" height="580" rx="24" ry="24" fill="#f4eefc" stroke="#c4b6da" stroke-width="2"/>
  <text x="800" y="62" text-anchor="middle" class="title">RAG Query - cvs_handler.process_query() (parallel mini-LLMs, 5 reliability groups)</text>

  <!-- Main horizontal flow -->
  <ellipse cx="120" cy="140" rx="86" ry="40" fill="#ece7f8" stroke="#8e7cc3" stroke-width="2"/>
  <text x="120" y="136" text-anchor="middle" class="small">User query</text>
  <text x="120" y="154" text-anchor="middle" class="tiny">(React frontend)</text>

  <rect x="240" y="102" width="220" height="76" class="box" fill="#efe9fb" stroke="#8e7cc3"/>
  <text x="350" y="132" text-anchor="middle" class="small">LangGraph</text>
  <text x="350" y="150" text-anchor="middle" class="tiny">validate -> classify -> retrieve -> process_cvs</text>

  <rect x="500" y="102" width="210" height="76" class="box" fill="#efe9fb" stroke="#8e7cc3"/>
  <text x="605" y="130" text-anchor="middle" class="small">Retriever</text>
  <text x="605" y="148" text-anchor="middle" class="tiny">Azure AI Search</text>
  <text x="605" y="164" text-anchor="middle" class="tiny">top_k=50, no RAG-Fusion</text>

  <rect x="750" y="98" width="250" height="84" class="box" fill="#efe9fb" stroke="#8e7cc3"/>
  <text x="875" y="126" text-anchor="middle" class="small">classify_chunks_by_reliability</text>
  <text x="875" y="146" text-anchor="middle" class="tiny">min-max normalize @search.score</text>
  <text x="875" y="164" text-anchor="middle" class="tiny">split into 5 groups (T1..T4)</text>

  <!-- Reliability groups in one row -->
  <rect x="80" y="252" width="190" height="82" class="box" fill="#d8f0da" stroke="#5b8f5e"/>
  <text x="175" y="280" text-anchor="middle" class="small">Group 1 (>= T1)</text>
  <text x="175" y="298" text-anchor="middle" class="tiny">High reliability</text>
  <text x="175" y="316" text-anchor="middle" class="tiny">Direct extraction (no LLM)</text>

  <rect x="300" y="252" width="180" height="82" class="box" fill="#e3efcf" stroke="#7a9d45"/>
  <text x="390" y="285" text-anchor="middle" class="small">Group 2 (T2..T1)</text>

  <rect x="500" y="252" width="180" height="82" class="box" fill="#f7efbf" stroke="#c89a2b"/>
  <text x="590" y="285" text-anchor="middle" class="small">Group 3 (T3..T2)</text>

  <rect x="700" y="252" width="180" height="82" class="box" fill="#fde3bf" stroke="#d17f2d"/>
  <text x="790" y="285" text-anchor="middle" class="small">Group 4 (T4..T3)</text>

  <rect x="900" y="252" width="180" height="82" class="box" fill="#f7d0d4" stroke="#c16d75"/>
  <text x="990" y="285" text-anchor="middle" class="small">Group 5 (&lt; T4)</text>
  <text x="990" y="303" text-anchor="middle" class="tiny">Low reliability</text>

  <!-- Mini LLM stage -->
  <rect x="300" y="390" width="780" height="96" class="box" fill="#ead7f7" stroke="#8e7cc3"/>
  <text x="690" y="420" text-anchor="middle" class="label">Parallel mini-LLM stage</text>
  <text x="690" y="440" text-anchor="middle" class="tiny">Per group: split into batches of CVS_CHUNK_SIZE</text>
  <text x="690" y="458" text-anchor="middle" class="tiny">ThreadPoolExecutor(max_workers=min(#batches, 8))</text>
  <text x="690" y="476" text-anchor="middle" class="tiny">Each call receives: chunk batch + user question + instruction prompt</text>

  <!-- Final assembly and outputs -->
  <rect x="1120" y="242" width="260" height="122" class="box" fill="#ffd877" stroke="#d68c1f"/>
  <text x="1250" y="272" text-anchor="middle" class="label">format_final_response()</text>
  <text x="1250" y="292" text-anchor="middle" class="tiny">Powerful LLM (gpt-4.1)</text>
  <text x="1250" y="310" text-anchor="middle" class="tiny">Main results + Other matching profiles</text>
  <text x="1250" y="328" text-anchor="middle" class="tiny">Deduplicated markdown list</text>

  <rect x="1420" y="250" width="146" height="64" class="box" fill="#ffffff" stroke="#8e7cc3"/>
  <text x="1493" y="276" text-anchor="middle" class="small">CvsHistory</text>
  <text x="1493" y="294" text-anchor="middle" class="tiny">cvs_history.json</text>

  <ellipse cx="1460" cy="430" rx="100" ry="42" fill="#ece7f8" stroke="#8e7cc3" stroke-width="2"/>
  <text x="1460" y="426" text-anchor="middle" class="small">Final answer</text>
  <text x="1460" y="444" text-anchor="middle" class="tiny">to user (React UI)</text>

  <!-- Sequential arrows -->
  <line x1="206" y1="140" x2="240" y2="140" stroke="#5f6570" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="140" x2="500" y2="140" stroke="#5f6570" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="140" x2="750" y2="140" stroke="#5f6570" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Fan-out to groups -->
  <line x1="835" y1="182" x2="175" y2="252" stroke="#5f6570" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="855" y1="182" x2="390" y2="252" stroke="#5f6570" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="875" y1="182" x2="590" y2="252" stroke="#5f6570" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="895" y1="182" x2="790" y2="252" stroke="#5f6570" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="915" y1="182" x2="990" y2="252" stroke="#5f6570" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dashed parallel arrows from groups 2..5 to mini stage -->
  <line x1="390" y1="334" x2="470" y2="390" stroke="#845ec2" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowDashed)"/>
  <line x1="590" y1="334" x2="610" y2="390" stroke="#845ec2" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowDashed)"/>
  <line x1="790" y1="334" x2="770" y2="390" stroke="#845ec2" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowDashed)"/>
  <line x1="990" y1="334" x2="920" y2="390" stroke="#845ec2" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowDashed)"/>

  <!-- Group1 and mini to final formatter -->
  <path d="M175 334 L175 515 L1110 515 L1120 315" fill="none" stroke="#5f6570" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1080" y1="438" x2="1120" y2="320" stroke="#5f6570" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Outputs -->
  <line x1="1380" y1="280" x2="1420" y2="282" stroke="#5f6570" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1320" y1="364" x2="1420" y2="402" stroke="#5f6570" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="56" y="540" width="520" height="42" rx="10" ry="10" fill="#ffffff" stroke="#b8b2c8" stroke-width="1.5"/>
  <line x1="76" y1="561" x2="136" y2="561" stroke="#5f6570" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="146" y="565" class="tiny">solid arrow = sequential flow</text>
  <line x1="300" y1="561" x2="360" y2="561" stroke="#845ec2" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowDashed)"/>
  <text x="370" y="565" class="tiny">dashed arrow = parallel fan-out</text>
</svg>
